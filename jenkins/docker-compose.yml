services:
  jenkins:
    # image: jenkins/jenkins:jdk21
    build:
      context: .
    container_name: jenkins
    user: root
    restart: always
    ports:
      - 8080:8080
      - 50000:50000
    volumes:
      - /var/jenkins/data:/var/jenkins_home/
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/local/bin/aliyun:/usr/local/bin/aliyun:ro
      - /home/hanke/.aliyun:/root/.aliyun
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /usr/local/bin/kubectl:/usr/local/bin/kubectl:ro
      - /etc/rancher/k3s/k3s.yaml:/root/.kube/config:ro
      - /usr/local/bin/helm:/usr/local/bin/helm:ro
    environment:
      - JAVA_OPTS=-Xms1024m -Xmx4096m
    mem_limit: 4g